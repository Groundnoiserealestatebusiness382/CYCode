<svg width="900" height="430" viewBox="0 0 900 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CYCode architecture: three frontends, one agent core, one permission gate, three tool families">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" stroke="#39455c" stroke-width="1.5" fill="none"/>
    </marker>
  </defs>

  <rect width="900" height="430" rx="16" fill="#0d1117"/>
  <rect x="0.75" y="0.75" width="898.5" height="428.5" rx="15.25" stroke="#21293a" stroke-width="1.5"/>

  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- frontends -->
    <g font-size="16.5">
      <rect x="90" y="46" width="200" height="52" rx="10" fill="#121a29" stroke="#2a3f63" stroke-width="1.4"/>
      <text x="190" y="78" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">cycode</text>
      <rect x="350" y="46" width="200" height="52" rx="10" fill="#121a29" stroke="#2a3f63" stroke-width="1.4"/>
      <text x="450" y="78" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">cycode ui</text>
      <rect x="610" y="46" width="200" height="52" rx="10" fill="#121a29" stroke="#2a3f63" stroke-width="1.4"/>
      <text x="710" y="78" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">cycode exec</text>
    </g>
    <g font-size="13" fill="#5b6c8c">
      <text x="190" y="120">terminal</text>
      <text x="450" y="120">local web GUI</text>
      <text x="710" y="120">scripts · CI · loops</text>
    </g>

    <path d="M190 128 V150 H430 V162" stroke="#39455c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
    <path d="M450 128 V162" stroke="#39455c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
    <path d="M710 128 V150 H470 V162" stroke="#39455c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

    <!-- core -->
    <rect x="200" y="166" width="500" height="88" rx="12" fill="#101b2e" stroke="#58a6ff" stroke-width="1.8"/>
    <text x="450" y="203" font-size="19" font-weight="700" fill="#58a6ff">Agent core</text>
    <text x="450" y="232" font-size="14" fill="#8b949e">turn loop · permission gate · sessions · compaction · any model</text>

    <path d="M270 254 V286" stroke="#39455c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
    <path d="M450 254 V286" stroke="#39455c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
    <path d="M630 254 V286" stroke="#39455c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

    <!-- tool families -->
    <g font-size="16.5" font-weight="700">
      <rect x="120" y="290" width="300" height="92" rx="10" fill="#0f1f16" stroke="#23513a" stroke-width="1.4"/>
      <text x="270" y="324" fill="#3fb950">Code</text>
      <rect x="440" y="290" width="300" height="92" rx="10" fill="#101b2e" stroke="#2a3f63" stroke-width="1.4"/>
      <text x="590" y="324" fill="#58a6ff">Research</text>
      <rect x="760" y="290" width="92" height="92" rx="10" fill="#1a1422" stroke="#4a2a52" stroke-width="1.4"/>
      <text x="806" y="324" fill="#d2a8ff">MCP</text>
    </g>
    <g font-size="13.5" fill="#8b949e" font-family="ui-monospace, Menlo, Consolas, monospace">
      <text x="270" y="350">read · edit · grep · bash</text>
      <text x="270" y="370">glob · web_fetch · todo</text>
      <text x="590" y="350">arxiv · papers · notebooks</text>
      <text x="590" y="370">experiments · latex</text>
      <text x="806" y="354">any</text>
      <text x="806" y="372">server</text>
    </g>
  </g>
</svg>
