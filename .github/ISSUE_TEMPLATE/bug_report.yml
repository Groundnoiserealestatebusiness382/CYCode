name: Bug report
description: Something doesn't work the way it should
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
      placeholder: |
        Ran `cycode exec "..." --json` and ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Exact command(s) and the smallest setup that triggers it.
      render: sh
  - type: input
    id: model
    attributes:
      label: Model spec
      placeholder: anthropic/claude-sonnet-4-6
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 15 / Node 22.4 / cycode 0.1.0 (cycode --version)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Error output, or relevant lines from a --json event log. Redact secrets.
      render: text
