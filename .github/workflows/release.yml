name: Release

# Pushing a v* tag builds standalone binaries for all platforms and attaches
# them to a GitHub Release. npm publication is intentionally manual for now.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run gen

      - name: Compile binaries for all platforms
        run: |
          set -euo pipefail
          mkdir -p out
          targets="bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64 bun-windows-x64"
          for t in $targets; do
            name="cycode-${t#bun-}"
            bun build --compile --minify --target="$t" src/cli.ts --outfile "out/$name"
          done
          ls -lh out/

      - name: Package archives
        run: |
          set -euo pipefail
          cd out
          for f in cycode-darwin-arm64 cycode-darwin-x64 cycode-linux-x64 cycode-linux-arm64; do
            tar czf "$f.tar.gz" "$f"
          done
          zip -q cycode-windows-x64.zip cycode-windows-x64.exe
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/*.tar.gz
            out/*.zip
            out/SHA256SUMS.txt
